# URL de tu base de datos de pruebas (debe ser una BD distinta a la de desarrollo)
spring.datasource.url=jdbc:mysql://localhost/vollmed_api_test

# Credenciales de acceso
spring.datasource.username=root
spring.datasource.password=@LR1505msMYSQL@

# Driver (opcional, Spring suele detectarlo, pero es buena práctica)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Esto evita que Hibernate intente validar cambios en la estructura de la tabla constantemente
spring.jpa.hibernate.ddl-auto=update

# Esto te ayuda a ver qué SQL está ejecutando realmente el test si algo falla
spring.jpa.show-sql=true

# Clave secreta fija para que los tests de autenticación funcionen siempre
api.security.token.secret=test-secret-key-super-segura-1234567890